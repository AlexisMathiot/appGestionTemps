<dialog id="delete-modal-{{ category.id }}" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box">
        <h3 class="text-lg font-bold">Supprimer cette catégorie ?</h3>
        <p class="py-4">{{ category.emoji }} {{ category.name }} sera supprimée définitivement.</p>
        <div class="modal-action">
            <form method="dialog"><button class="btn min-h-[44px]">Annuler</button></form>
            <form hx-post="/categories/{{ category.id }}/delete" hx-target="#app-shell" hx-select="#app-shell" hx-swap="outerHTML">
                <button class="btn btn-error min-h-[44px]">Supprimer</button>
            </form>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
