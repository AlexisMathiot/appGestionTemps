<form id="register-form" hx-post="/auth/register" hx-swap="outerHTML" hx-target="#register-form" novalidate>

    <fieldset class="fieldset mb-4">
        <label class="label" for="email">Email</label>
        <input type="email" id="email" name="email"
               value="{{ form_data.get('email', '') }}"
               placeholder="vous@exemple.com"
               class="input w-full {% if errors.get('email') %}input-error{% endif %}"
               required />
        {% if errors.get('email') %}
        <p class="label text-error">{{ errors.email }}</p>
        {% endif %}
    </fieldset>

    <fieldset class="fieldset mb-4">
        <label class="label" for="password">Mot de passe</label>
        <input type="password" id="password" name="password"
               placeholder="Minimum 8 caractères"
               class="input w-full {% if errors.get('password') %}input-error{% endif %}"
               required minlength="8" />
        {% if errors.get('password') %}
        <p class="label text-error">{{ errors.password }}</p>
        {% endif %}
    </fieldset>

    <fieldset class="fieldset mb-6">
        <label class="label" for="password_confirm">Confirmer le mot de passe</label>
        <input type="password" id="password_confirm" name="password_confirm"
               placeholder="Retapez votre mot de passe"
               class="input w-full {% if errors.get('password_confirm') %}input-error{% endif %}"
               required minlength="8" />
        {% if errors.get('password_confirm') %}
        <p class="label text-error">{{ errors.password_confirm }}</p>
        {% endif %}
    </fieldset>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary w-full">Créer mon compte</button>
    </div>

</form>
