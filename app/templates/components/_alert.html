{# Usage: {% include "components/_alert.html" with context %}
   Expects: alert_type ("success" | "error"), alert_message (string) #}
{% if alert_message %}
<div class="toast toast-top toast-center z-[100] mt-16" id="flash-toast">
    <div class="alert alert-{{ alert_type }} shadow-lg" role="alert">
        {% if alert_type == 'success' %}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {% elif alert_type == 'error' %}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        {% endif %}
        <span>{{ alert_message }}</span>
        <button type="button" class="btn btn-ghost btn-xs" onclick="this.closest('#flash-toast').remove()">✕</button>
    </div>
</div>
<script>setTimeout(function(){ var el = document.getElementById('flash-toast'); if(el) el.remove(); }, 4000);</script>
{% endif %}
