<form id="login-form" hx-post="/auth/login" hx-swap="outerHTML" hx-target="#login-form" novalidate>

    <fieldset class="fieldset mb-4">
        <label class="label" for="email">Email</label>
        <input type="email" id="email" name="email"
               value="{{ form_data.get('email', '') }}"
               placeholder="vous@exemple.com"
               class="input w-full {% if error %}input-error{% endif %}"
               required />
    </fieldset>

    <fieldset class="fieldset mb-2">
        <label class="label" for="password">Mot de passe</label>
        <input type="password" id="password" name="password"
               placeholder="Votre mot de passe"
               class="input w-full {% if error %}input-error{% endif %}"
               required />
        {% if error %}
        <p class="label text-error">{{ error }}</p>
        {% endif %}
    </fieldset>

    <div class="text-right mb-4">
        <a href="/auth/forgot-password" class="link link-primary text-sm">Mot de passe oublié ?</a>
    </div>

    <div class="mt-4">
        <button type="submit" class="btn btn-primary w-full">Se connecter</button>
    </div>

</form>
