<div class="card card-compact bg-base-200 shadow-md border-l-4 min-h-[44px] hover:shadow-lg transition-shadow"
     style="border-left-color: {{ category.color }}">
    <div class="flex flex-row items-stretch justify-between p-3 gap-2 w-full">
        <button class="flex-1 flex flex-col gap-1 text-left cursor-pointer bg-transparent border-0 p-0"
                hx-post="/api/timer/start"
                hx-vals='{"category_id": "{{ category.id }}"}'
                hx-target="#timer-container"
                hx-swap="innerHTML"
                aria-label="Démarrer le timer {{ category.name }}">
            <div class="text-3xl">{{ category.emoji }}</div>
            <h3 class="card-title text-sm">{{ category.name }}</h3>
            <p class="text-xs text-secondary">0min</p>
            {% if category.goal_type and category.goal_value %}
            <p class="text-xs text-accent">🎯 {{ category.goal_value }}min/{{ "jour" if category.goal_type == "daily" else "semaine" }}</p>
            {% endif %}
        </button>
        <div class="flex flex-col justify-between items-center ml-auto">
            <a hx-get="/categories/{{ category.id }}"
               hx-push-url="true"
               hx-target="#app-shell"
               hx-select="#app-shell"
               hx-swap="outerHTML"
               class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
               aria-label="Détails {{ category.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </a>
            <button hx-get="/categories/{{ category.id }}/edit"
                    hx-target="#edit-form-container-{{ category.id }}"
                    hx-swap="innerHTML"
                    hx-on::after-request="if(event.detail.successful) document.getElementById('edit-modal-{{ category.id }}').showModal()"
                    class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
                    aria-label="Modifier {{ category.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </button>
            <button onclick="document.getElementById('delete-modal-{{ category.id }}').showModal()"
                    class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
                    aria-label="Supprimer {{ category.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>
</div>
