<a href="/categories/{{ category.id }}"
   class="card card-compact bg-base-100 shadow-sm border-l-4 min-h-[44px] min-w-[44px] cursor-pointer hover:shadow-md transition-shadow"
   style="border-left-color: {{ category.color }}"
   hx-get="/categories/{{ category.id }}"
   hx-push-url="true"
   hx-target="#app-shell"
   hx-select="#app-shell"
   hx-swap="outerHTML">
    <div class="card-body p-3">
        <div class="text-3xl">{{ category.emoji }}</div>
        <h3 class="card-title text-sm">{{ category.name }}</h3>
        <p class="text-xs text-secondary">0min</p>
    </div>
</a>
