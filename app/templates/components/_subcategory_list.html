{% if subcategories %}
<div class="flex flex-col gap-2">
    {% for sub in subcategories %}
    <div class="flex items-center justify-between p-3 bg-base-200 rounded-lg border-l-4"
         style="border-left-color: {{ category.color }}">
        <div class="flex items-center gap-2">
            {% if sub.emoji %}<span class="text-xl">{{ sub.emoji }}</span>{% endif %}
            <span class="font-medium">{{ sub.name }}</span>
        </div>
        <div class="flex items-center gap-1">
            <button hx-post="/api/timer/start"
                    hx-vals='{"category_id": "{{ sub.id }}"}'
                    hx-target="#timer-container"
                    hx-swap="innerHTML"
                    class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
                    aria-label="Démarrer timer {{ sub.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button hx-get="/categories/{{ category.id }}/subcategories/{{ sub.id }}/edit"
                    hx-target="#edit-sub-form-container-{{ sub.id }}"
                    hx-swap="innerHTML"
                    hx-on::after-request="if(event.detail.successful) document.getElementById('edit-sub-modal-{{ sub.id }}').showModal()"
                    class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
                    aria-label="Modifier {{ sub.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </button>
            <button onclick="document.getElementById('delete-sub-modal-{{ sub.id }}').showModal()"
                    class="p-1 rounded hover:bg-base-300 text-base-content opacity-60 hover:opacity-100"
                    aria-label="Supprimer {{ sub.name }}">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-8 text-secondary">
    <p>Aucune sous-catégorie. Ajoutez-en une pour détailler vos activités.</p>
</div>
{% endif %}
