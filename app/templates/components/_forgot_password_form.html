<form id="forgot-form" hx-post="/auth/forgot-password" hx-swap="outerHTML" hx-target="#forgot-form" novalidate>

    {% if success_message %}
    <div class="alert alert-success mb-4">
        <span>{{ success_message }}</span>
    </div>
    {% if reset_url %}
    <div class="alert alert-info mb-4">
        <div>
            <p class="font-bold text-sm">Mode développement — lien de réinitialisation :</p>
            <a href="{{ reset_url }}" class="link link-primary break-all text-sm">{{ reset_url }}</a>
        </div>
    </div>
    {% endif %}
    {% else %}

    <div class="form-control w-full mb-6">
        <label class="label" for="email">
            <span class="label-text">Email</span>
        </label>
        <input type="email" id="email" name="email"
               value="{{ form_data.get('email', '') }}"
               placeholder="vous@exemple.com"
               class="input input-bordered w-full {% if errors.get('email') %}input-error{% endif %}"
               required />
        {% if errors.get('email') %}
        <label class="label">
            <span class="label-text-alt text-error">{{ errors.email }}</span>
        </label>
        {% endif %}
    </div>

    <div class="form-control mt-4">
        <button type="submit" class="btn btn-primary w-full">Envoyer le lien de réinitialisation</button>
    </div>

    {% endif %}

</form>
